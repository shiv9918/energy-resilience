services:
  - type: web
    name: energy-resilience-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROK_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: BASE_OIL_PRICE_USD
        value: "75.0"
    rootDir: backend
